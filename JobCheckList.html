<div id="hw-job-checker" style="max-width:760px;margin:20px auto;padding:20px;border:1px solid #ddd;border-radius:12px;font-family:system-ui,sans-serif;line-height:1.7;">
  <h2>求人応募チェックリスト</h2>

  <p>当てはまる項目にチェックしてください。合計点と応募判定を自動表示します。</p>

  <h3>条件面</h3>
  <label><input type="checkbox" class="hw-check"> 年収・月給が希望ライン以上</label><br>
  <label><input type="checkbox" class="hw-check"> 賞与実績あり</label><br>
  <label><input type="checkbox" class="hw-check"> 昇給実績あり</label><br>
  <label><input type="checkbox" class="hw-check"> 固定残業代なし、または内容が明確</label><br>
  <label><input type="checkbox" class="hw-check"> 通勤可能範囲</label><br>

  <h3>働き方</h3>
  <label><input type="checkbox" class="hw-check"> 年間休日115日以上</label><br>
  <label><input type="checkbox" class="hw-check"> 土日祝休み、またはそれに近い</label><br>
  <label><input type="checkbox" class="hw-check"> 月残業20時間以内</label><br>
  <label><input type="checkbox" class="hw-check"> 転勤なし、または許容範囲</label><br>

  <h3>仕事内容</h3>
  <label><input type="checkbox" class="hw-check"> 職務内容が具体的</label><br>
  <label><input type="checkbox" class="hw-check"> 自分の経験が活かせる</label><br>
  <label><input type="checkbox" class="hw-check"> 何でも屋すぎない</label><br>

  <h3>会社面</h3>
  <label><input type="checkbox" class="hw-check"> 従業員数・事業内容が明確</label><br>
  <label><input type="checkbox" class="hw-check"> 設立年数が長く、事業継続性がある</label><br>
  <label><input type="checkbox" class="hw-check"> 募集理由が自然</label><br>

  <hr>

  <h3>危険信号</h3>
  <p>当てはまる場合は減点します。</p>

  <label><input type="checkbox" class="hw-risk"> 年収幅が広すぎる</label><br>
  <label><input type="checkbox" class="hw-risk"> 仕事内容が抽象的</label><br>
  <label><input type="checkbox" class="hw-risk"> 若手活躍中を過剰強調</label><br>
  <label><input type="checkbox" class="hw-risk"> 残業や休日の記載がぼかされている</label><br>
  <label><input type="checkbox" class="hw-risk"> 評価制度が不明</label><br>

  <div style="margin-top:24px;padding:18px;border-radius:10px;background:#f7f7f7;">
    <h3>採点結果</h3>
    <p style="font-size:22px;font-weight:bold;">点数：<span id="hw-score">0</span> 点</p>
    <p style="font-size:20px;font-weight:bold;">判定：<span id="hw-result">未判定</span></p>
    <p id="hw-comment"></p>
  </div>
</div>

<script>
(function() {
  const container = document.getElementById('hw-job-checker');
  const checks = container.querySelectorAll('.hw-check');
  const risks = container.querySelectorAll('.hw-risk');
  const scoreEl = document.getElementById('hw-score');
  const resultEl = document.getElementById('hw-result');
  const commentEl = document.getElementById('hw-comment');

  function updateScore() {
    let plus = 0;
    let minus = 0;

    checks.forEach(item => {
      if (item.checked) plus += 1;
    });

    risks.forEach(item => {
      if (item.checked) minus += 1;
    });

    const score = plus - minus;
    scoreEl.textContent = score;

    let result = '';
    let comment = '';

    if (score >= 10) {
      result = '◎ 積極応募';
      comment = '条件・仕事内容ともにかなり良好です。面接で詳細確認する価値があります。';
    } else if (score >= 7) {
      result = '○ 条件付き応募';
      comment = '悪くない求人です。懸念点を面接で確認した上で進めるのが現実的です。';
    } else if (score >= 4) {
      result = '△ キープ';
      comment = '応募してもよいですが、本命にはせず比較対象として扱うのが安全です。';
    } else {
      result = '× 見送り寄り';
      comment = '条件やリスク面で注意が必要です。急いで応募する必要は低そうです。';
    }

    resultEl.textContent = result;
    commentEl.textContent = comment;
  }

  checks.forEach(item => item.addEventListener('change', updateScore));
  risks.forEach(item => item.addEventListener('change', updateScore));

  updateScore();
})();
</script>
