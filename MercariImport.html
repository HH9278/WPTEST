<div id="mercari-import-app" style="max-width:100%; font-family:sans-serif;">
  <h3>メルカリ出品テキスト取り込み</h3>

  <textarea id="mercariText"
    placeholder="メルカリの商品ページをコピーしてここに貼り付けてください"
    style="width:100%; height:260px; padding:10px; box-sizing:border-box;"></textarea>

  <div style="margin:10px 0;">
    <button onclick="importMercariText()" style="padding:8px 16px; cursor:pointer;">
      取り込み
    </button>
  </div>

  <table border="1" cellspacing="0" cellpadding="6" style="width:100%; border-collapse:collapse;">
    <thead>
      <tr>
        <th>No</th>
        <th>商品名</th>
        <th>ブランド</th>
        <th>価格</th>
        <th>カテゴリー</th>
        <th>状態</th>
        <th>配送方法</th>
        <th>発送日数</th>
      </tr>
    </thead>
    <tbody id="mercariList"></tbody>
  </table>
</div>

<script>
let mercariCount = 0;

function importMercariText() {
  const textarea = document.getElementById('mercariText');
  const text = textarea.value;

  if (!text.trim()) {
    alert('テキストを貼り付けてください。');
    return;
  }

  const lines = text
    .split(/\r?\n/)
    .map(line => line.trim())
    .filter(line => line !== '');

  const item = parseMercariText(lines);

  mercariCount++;

  const tbody = document.getElementById('mercariList');
  const tr = document.createElement('tr');

  tr.innerHTML = `
    <td>${mercariCount}</td>
    <td>${escapeHtml(item.title)}</td>
    <td>${escapeHtml(item.brand)}</td>
    <td>${escapeHtml(item.price)}</td>
    <td>${escapeHtml(item.category)}</td>
    <td>${escapeHtml(item.condition)}</td>
    <td>${escapeHtml(item.shippingMethod)}</td>
    <td>${escapeHtml(item.shippingDays)}</td>
  `;

  tbody.appendChild(tr);

  textarea.value = '';
}

function parseMercariText(lines) {
  const item = {
    title: '',
    brand: '',
    price: '',
    category: '',
    condition: '',
    shippingMethod: '',
    shippingDays: ''
  };

  // 価格
  const priceLine = lines.find(line => /^¥[\d,]+$/.test(line));
  item.price = priceLine || '';

  // 商品名：価格の直前あたりにある長めの商品名を拾う
  const priceIndex = lines.findIndex(line => line === priceLine);
  if (priceIndex > 0) {
    for (let i = priceIndex - 1; i >= 0; i--) {
      if (
        lines[i] !== '1 / 3' &&
        !lines[i].includes('画像') &&
        lines[i] !== '出品' &&
        lines[i] !== 'ホーム'
      ) {
        item.title = lines[i];
        break;
      }
    }
  }

  // ブランド：商品名の次行、または「ブランド」の次行
  const brandLabelIndex = lines.findIndex(line => line === 'ブランド');
  if (brandLabelIndex >= 0 && lines[brandLabelIndex + 1]) {
    item.brand = lines[brandLabelIndex + 1];
  } else if (priceIndex > 1) {
    item.brand = lines[priceIndex - 1] || '';
  }

  // カテゴリー
  const categoryIndex = lines.findIndex(line => line === 'カテゴリー');
  if (categoryIndex >= 0) {
    const categoryParts = [];
    for (let i = categoryIndex + 1; i < lines.length; i++) {
      if (lines[i] === 'ブランド' || lines[i] === '商品の状態') {
        break;
      }
      categoryParts.push(lines[i]);
    }
    item.category = categoryParts.join(' > ');
  }

  // 商品状態
  const conditionIndex = lines.findIndex(line => line === '商品の状態');
  if (conditionIndex >= 0 && lines[conditionIndex + 1]) {
    item.condition = lines[conditionIndex + 1];
  }

  // 配送方法
  const shippingMethodIndex = lines.findIndex(line => line === '配送の方法');
  if (shippingMethodIndex >= 0 && lines[shippingMethodIndex + 1]) {
    item.shippingMethod = lines[shippingMethodIndex + 1];
  }

  // 発送日数
  const shippingDaysIndex = lines.findIndex(line => line === '発送までの日数');
  if (shippingDaysIndex >= 0 && lines[shippingDaysIndex + 1]) {
    item.shippingDays = lines[shippingDaysIndex + 1];
  }

  return item;
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
</script>
