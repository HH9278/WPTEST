<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple TODO</title>
<style>
#todo-wrap{max-width:520px;margin:20px auto;padding:16px;border:1px solid #ddd;border-radius:12px;font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;background:#fff}
#todo-wrap h2{margin:0 0 12px;font-size:24px}
#todo-wrap .row{display:flex;gap:8px}
#todo-wrap input[type=text]{flex:1;padding:10px;border:1px solid #ccc;border-radius:8px}
#todo-wrap button{padding:10px 14px;border:0;border-radius:8px;cursor:pointer;background:#222;color:#fff}
#todo-list{list-style:none;padding:0;margin:14px 0 0}
#todo-list li{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #eee}
#todo-list li span{flex:1}
#todo-list li.done span{text-decoration:line-through;color:#888}
#todo-list .del{background:#f3f3f3;color:#333}
</style>
</head>
<body>
<div id="todo-wrap">
<h2>TODOリスト</h2>
<div class="row">
<input id="todo-input" type="text" placeholder="TODO">
</div>
<div class="row" style="margin-top:8px;">
<input id="todo-cat" type="text" placeholder="カテゴリ" list="cat-list"><datalist id="cat-list"></datalist>
<input id="todo-due" type="date">
<button onclick="addTodo()">追加</button>
</div>
<ul id="todo-list"></ul>
</div>
<script>
const KEY='simple_wp_todos';
let todos=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(todos));setDefaultDue();render();}
function addTodo(){const el=document.getElementById('todo-input');const cat=document.getElementById('todo-cat');const due=document.getElementById('todo-due');const text=el.value.trim();if(!text)return;todos.unshift({id:Date.now(),text,category:cat.value.trim(),due:due.value,done:false});const keepDue=due.value;el.value='';cat.value='';due.value=keepDue;save();}
function toggleTodo(id){todos=todos.map(t=>t.id===id?{...t,done:!t.done}:t);save();}
function delTodo(id){todos=todos.filter(t=>t.id!==id);save();}
function editTodo(id){const t=todos.find(x=>x.id===id); if(!t) return; const v=prompt('TODOを編集', t.text); if(v===null) return; const nv=v.trim(); if(!nv) return; todos=todos.map(x=>x.id===id?{...x,text:nv}:x); save();}
function render(){const cats=[...new Set(todos.map(t=>t.category).filter(Boolean))];document.getElementById('cat-list').innerHTML=cats.map(c=>`<option value="${c.replace(/"/g,'&quot;')}">`).join('');todos.sort((a,b)=>{if(a.done!==b.done)return a.done-b.done; if(a.due && b.due){const d=a.due.localeCompare(b.due); if(d!==0) return d; return a.text.localeCompare(b.text,'ja');} if(a.due) return -1; if(b.due) return 1; return a.text.localeCompare(b.text,'ja');}); const list=document.getElementById('todo-list');const groups={};todos.forEach(t=>{const key=t.due||'日付なし';(groups[key]||(groups[key]=[])).push(t);});list.innerHTML=Object.keys(groups).map(day=>`<li style="border:0;padding:8px 0 4px;font-weight:bold;">${day}</li>`+groups[day].map(t=>`<li class="${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${t.id})"><span>${t.text.replace(/</g,'&lt;')} ${t.category?`<small style='color:#666'>[${t.category}]</small>`:''}</span><button class="del" onclick="editTodo(${t.id})">編集</button><button class="del" onclick="delTodo(${t.id})">削除</button></li>`).join('')).join('');}
function setDefaultDue(){const d=new Date();d.setDate(d.getDate()+1);const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');document.getElementById('todo-due').value=`${y}-${m}-${day}`;}document.getElementById('todo-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTodo();});
render();
</script>
</body>
</html>
