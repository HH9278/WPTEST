<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
.calc-wrap{
  width:100%;
  max-width:none;
  margin:20px 0;
  padding:16px;
  border:1px solid #ddd;
  border-radius:16px;
  font-family:system-ui,sans-serif;
  background:#fff;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  box-sizing:border-box;
}

.display{
  width:100%;
  height:56px;
  font-size:28px;
  text-align:right;
  padding:8px 12px;
  border:1px solid #ccc;
  border-radius:12px;
  margin-bottom:12px;
  box-sizing:border-box;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

button{
  height:52px;
  font-size:20px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:#f1f3f5;
}

button:hover{filter:brightness(.97);}
.op{background:#e9ecef;}
.eq{background:#111;color:#fff;}
.zero{grid-column:span 2;}
</style>
</head>
<body>

<div class="calc-wrap">
<input id="display" class="display" type="text" value="0" readonly>

<div class="grid">
<button onclick="clr()">C</button>
<button onclick="delChar()">⌫</button>
<button class="op" onclick="press('%')">%</button>
<button class="op" onclick="press('/')">÷</button>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="op" onclick="press('*')">×</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="op" onclick="press('-')">−</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="op" onclick="press('+')">＋</button>

<button class="zero" onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button class="eq" onclick="calc()">=</button>
</div>
</div>

<script>
const d = document.getElementById('display');

function press(v){
  d.value = d.value === '0' ? v : d.value + v;
}

function clr(){
  d.value = '0';
}

function delChar(){
  d.value = d.value.length > 1 ? d.value.slice(0,-1) : '0';
}

function calc(){
  try{
    let r = Function('return ' + d.value)();
    d.value = Number.isFinite(r) ? String(r) : 'Error';
  }catch(e){
    d.value = 'Error';
  }
}
</script>

</body>
</html>
